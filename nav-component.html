<!-- Navigation Menu -->
<nav id="navbar">
    <div class="container nav-inner">
        <a class="brand" href="index.html" aria-label="eDigital Solutions Home">
            <img src="favicon-master-1024.png" alt="eDigital Solutions logo" width="72" height="72">
            <span class="brand-wordmark" aria-label="eDigital Solutions">
                <span class="brand-main"><span class="brand-e">e</span>Digital</span>
                <span class="brand-sub">Solutions</span>
            </span>
        </a>

        <div class="menu-toggle" aria-label="Open menu" role="button" tabindex="0">
            <i class="fas fa-bars"></i>
        </div>

        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="knowledge-hub.html">Knowledge Hub</a></li>
            <li><a href="blog.html">Blog</a></li>
            <li><a href="newseasheq.html">Newsletter</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </div>
</nav>

<script>
    (function() {
        // Auto-detect active page
        var path = window.location.pathname.split('/').pop() || 'index.html';

        if (path === '') {
            path = 'index.html';
        }

        var links = document.querySelectorAll('nav ul li a');

        links.forEach(function(link) {
            var href = link.getAttribute('href');

            if (path === href || (path === '' && href === 'index.html')) {
                link.classList.add('active');
            }
        });

        // Mobile toggle
        var toggle = document.querySelector('.menu-toggle');
        var menu = document.querySelector('nav ul');

        if (toggle && menu) {
            toggle.addEventListener('click', function() {
                menu.classList.toggle('active');
                toggle.classList.toggle('active');
            });

            toggle.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    menu.classList.toggle('active');
                    toggle.classList.toggle('active');
                }
            });

            menu.querySelectorAll('a').forEach(function(a) {
                a.addEventListener('click', function() {
                    menu.classList.remove('active');
                    toggle.classList.remove('active');
                });
            });
        }

        // Scroll effect
        window.addEventListener('scroll', function() {
            var nav = document.getElementById('navbar');

            if (nav) {
                if (window.scrollY > 50) {
                    nav.classList.add('scrolled');
                } else {
                    nav.classList.remove('scrolled');
                }
            }
        });
    })();
</script>
